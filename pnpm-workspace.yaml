  '@qunhe/egs-lib': 'workspace:*'
  '@qunhe/egs': 'workspace:*'
  '@qunhe/egs-gltf-loader': 'workspace:*'
  '@qunhe/egs-draco-loader': 'workspace:*'
  '@qunhe/egs-splat-loader': 'workspace:*'
  '@qunhe/egs-splat-utils': 'workspace:*'
  '@internal/cli': 'workspace:*'
  '@internal/utils': 'workspace:*'
  '@types/node': '^22.19.19'
  'typescript': '^6.0.3'
  'tslib': '^2.8.1'

publicHoistPattern:
  - '*prettier*'
